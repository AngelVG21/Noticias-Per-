<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Wow - Smart TV</title>
    <style>
        :root {
            --c-gray: #9aa0a8;
            --c-slate: #36494e;
            --c-dark: #1b2527;
            --c-neon: #d9f812;
            --c-cream: #fdf5bf;
            --c-red: #d33f49;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: var(--c-dark); color: var(--c-cream); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .promo-container {
            background-color: var(--c-slate);
            border: 2px dashed var(--c-neon);
            max-width: 900px;
            width: 100%;
            padding: 50px;
            text-align: center;
        }
        .cyber-title { color: var(--c-neon); font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .product-name { font-size: 1.8rem; margin-bottom: 20px; color: white; }
        .prices { margin: 30px 0; }
        .old-price { text-decoration: line-through; color: var(--c-gray); font-size: 1.2rem; }
        .new-price { color: var(--c-red); font-size: 4rem; font-weight: bold; display: block; line-height: 1; }
        .btn-cart {
            display: inline-block;
            background-color: var(--c-cream);
            color: var(--c-dark);
            text-decoration: none;
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .btn-cart:hover { background-color: var(--c-neon); transform: scale(1.05); }
        .back-link { display: block; color: var(--c-gray); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="promo-container">
        <h1 class="cyber-title">⚡ CYBER WOW 2026 ⚡</h1>
        <h2 class="product-name">Smart TV OLED 65" 4K Ultra HD</h2>
        <div class="prices">
            <span class="old-price">Precio regular: S/ 4,999</span>
            <span class="new-price">S/ 1,999</span>
        </div>
        <a href="#" class="btn-cart" onclick="alert('¡Smart TV agregado a tu carrito exitosamente!'); return false;">🛒 Agregar al Carrito</a>
        <a href="../index.html" class="back-link">← Regresar a la página principal</a>
    </div>
</body>
</html>
