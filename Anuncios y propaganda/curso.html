<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Diseño Web - ISIL</title>
    <style>
        :root {
            --c-gray: #9aa0a8;
            --c-slate: #36494e;
            --c-dark: #1b2527;
            --c-neon: #d9f812;
            --c-cream: #fdf5bf;
            --c-red: #d33f49;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: var(--c-gray); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .landing-container {
            background-color: var(--c-cream);
            border: 4px solid var(--c-dark);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .tag { background-color: var(--c-red); color: white; padding: 5px 15px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        h1 { color: var(--c-dark); font-size: 2.5rem; margin-bottom: 20px; }
        p { color: var(--c-slate); font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-buy {
            display: inline-block;
            background-color: var(--c-neon);
            color: var(--c-dark);
            text-decoration: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid var(--c-dark);
            transition: all 0.3s;
        }
        .btn-buy:hover { background-color: var(--c-dark); color: var(--c-neon); }
        .back-link { display: block; margin-top: 40px; color: var(--c-slate); text-decoration: none; font-weight: bold; }
        .back-link:hover { color: var(--c-red); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="tag">OFERTA LIMITADA: -20% DSCTO</div>
        <h1>🎓 Conviértete en Experto en Diseño Web</h1>
        <p>Aprende HTML, CSS y crea páginas web modernas desde cero. Únete a ISIL y asegura tu futuro en el mundo digital. ¡Aprovecha nuestro descuento exclusivo válido solo por hoy!</p>
        
        <a href="#" class="btn-buy" onclick="alert('¡Gracias por tu interés! Te hemos enviado los detalles de matrícula a tu correo.'); return false;">¡Matricularme Ahora!</a>
        
        <a href="../index.html" class="back-link">← Volver a Noticias Perú</a>
    </div>
</body>
</html>
